plugins {
    id 'net.fabricmc.fabric-loom-remap' version '1.14.+'
    id 'maven-publish'
}

version = '1.0.0'
group = 'com.colorhitbox'

base { archivesName = 'colorhitbox' }

dependencies {
    minecraft "com.mojang:minecraft:1.21.11"
    mappings loom.officialMojangMappings()
    modImplementation "net.fabricmc:fabric-loader:0.18.1"
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.141.2+1.21.11"
}

processResources {
    filesMatching("fabric.mod.json") { expand "version": project.version }
}

tasks.withType(JavaCompile).configureEach { it.options.release = 21 }

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}
